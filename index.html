<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kasir Mitra Kaca v8.0.4 - Full System & Date</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; --info: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f4f4; }
        
        #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 8px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        #mainApp { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 340px; background: white; padding: 15px; border-right: 1px solid #ddd; overflow-y: auto; }
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #fdfdfd; }
        
        input, select, button { width: 100%; padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .row { display: flex; gap: 5px; align-items: center; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; }
        
        .table-cont { flex: 1; background: white; border-radius: 8px; overflow: auto; border: 1px solid #ddd; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }

        .summary-box { background: white; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        
        #adminModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; }
        .modal-content { background: white; width: 95%; margin: 10px auto; padding: 20px; border-radius: 8px; max-height: 95vh; overflow-y: auto; }

        .status-tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tag-lunas { background: #d4edda; color: #155724; }
        .tag-hutang { background: #f8d7da; color: #721c24; }

        .kop-nota { display: none; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }

        @media print {
            @page { size: A5 landscape; margin: 10mm; }
            .sidebar, .no-print, #adminModal, #loginScreen { display: none !important; }
            #mainApp { display: block; }
            .main { padding: 0; border: none; }
            .kop-nota { display: block; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2>MITRA KACA</h2>
        <input type="text" id="userLogin" placeholder="Username">
        <input type="password" id="passLogin" placeholder="Password">
        <button onclick="cekLogin()" style="background:var(--success); color:white; border:none; padding:10px; cursor:pointer;">MASUK</button>
    </div>
</div>

<div id="mainApp">
    <div class="sidebar no-print">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="displayUser">User</h3>
            <div id="liveDate" style="font-size: 12px; color: #666;"></div>
        </div>
        <button onclick="location.reload()" style="width:100%; background:#999; color:white; font-size:10px; border:none; margin-bottom: 5px;">Logout</button>
        <button id="btnAdmin" onclick="bukaAdmin()" style="display:none; background:var(--danger); color:white; border:none; font-size:11px; padding:10px; margin-bottom:10px; cursor:pointer;">🔒 PANEL ADMIN & RIWAYAT</button>
        <hr>
        <label>Tanggal Transaksi:</label>
        <input type="date" id="tgl_input">
        <label>Nama Pembeli:</label><input type="text" id="pembeli" value="Umum">
        <label>Ukuran (cm):</label>
        <div class="row"><input type="number" id="p" placeholder="P"> <span>x</span> <input type="number" id="l" placeholder="L"></div>
        <label>Jenis Kaca:</label><select id="selKaca"></select>
        <label>Bevel:</label><select id="bevel"><option value="none">Tanpa Bevel</option><option value="bev2">Bevel 2cm</option><option value="bev3">Bevel 3cm</option></select>
        <div style="background:#f9f9f9; padding:10px; border-radius:5px; margin-top:10px; border:1px solid #eee;">
            <label>Jasa Tambahan:</label>
            <div class="row"><span>Bor</span><input type="number" id="bor" value="0"> <span>CP</span><input type="number" id="pojok" value="0"></div>
            <div class="row"><span>CT</span><input type="number" id="tepi" value="0"></div>
        </div>
        <label>Status Bayar:</label>
        <select id="status_bayar" onchange="toggleDP()">
            <option value="Lunas">Lunas</option>
            <option value="Belum Lunas">Belum Lunas</option>
        </select>
        <div id="dp_area" style="display:none;"><input type="number" id="dp_val" value="0" placeholder="DP Rp"></div>
        <button class="btn-add" onclick="tambahItem()" style="margin-top:10px;">✚ TAMBAH ITEM</button>
        <button onclick="prosesTransaksi()" style="background:var(--primary); color:white; border:none; padding:12px; margin-top:10px; cursor:pointer;">🖨️ SIMPAN & PRINT A5</button>
    </div>

    <div class="main">
        <div class="kop-nota">
            <h2 id="kopNama">NAMA TOKO</h2>
            <p id="kopAlamat">Alamat Toko Anda</p>
            <p id="notaTanggal" style="text-align: right;"></p>
        </div>
        <div class="table-cont">
            <table>
                <thead><tr><th>Item</th><th>Ukuran</th><th>Jasa/Detail</th><th>Subtotal</th><th class="no-print">Aksi</th></tr></thead>
                <tbody id="billBody"></tbody>
            </table>
        </div>
        <div class="summary-box">
            <div id="statusDisplay" style="font-weight:bold; color:var(--danger)"></div>
            <div id="totalDisplay" style="font-size:24px; font-weight:bold; color:var(--info);">TOTAL: Rp 0</div>
        </div>
    </div>
</div>

<div id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Admin: Riwayat & Manajemen</h3>
            <button onclick="tutupAdmin()" style="width:100px; background:#999; color:white; border:none; padding:8px; cursor:pointer;">TUTUP</button>
        </div>
        <hr>

        <div style="background:#fff3cd; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #ffeeba;">
            <h4>📋 Riwayat Transaksi</h4>
            <div style="max-height: 200px; overflow: auto; background: white; border: 1px solid #ddd;">
                <table>
                    <thead><tr><th>Tanggal Nota</th><th>Pembeli</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
            <button onclick="hapusRiwayat()" style="background:var(--danger); color:white; width:150px; margin-top:10px; font-size:10px;">Hapus Semua Riwayat</button>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div style="background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #ddd;">
                <h4>Harga Kaca & Jasa</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div><label>Nama Kaca:</label><input type="text" id="admNama"></div>
                    <div><label>Harga Kaca/m2:</label><input type="number" id="admHarga"></div>
                    <div><label>Harga GM/m:</label><input type="number" id="admGM"></div>
                    <div><label>Harga Bor/titik:</label><input type="number" id="admBor"></div>
                    <div><label>Coak Pojok:</label><input type="number" id="admPojok"></div>
                    <div><label>Coak Tepi:</label><input type="number" id="admTepi"></div>
                    <div><label>Bevel 2cm:</label><input type="number" id="admBev2"></div>
                    <div><label>Bevel 3cm:</label><input type="number" id="admBev3"></div>
                </div>
                <button onclick="updateHarga()" style="background:var(--success); color:white; margin-top:15px; padding:10px; cursor:pointer;">SIMPAN DATA KACA</button>
            </div>

            <div style="background:#eee; padding:15px; border-radius:8px;">
                <h4>Daftar Kaca</h4>
                <div style="max-height:120px; overflow:auto;"><table style="background:white;"><tbody id="adminTableBody"></tbody></table></div>
                <hr>
                <h4>👥 User & Password</h4>
                <div style="background:#fff; padding:10px; border-radius:5px; margin-bottom:5px;">
                    <input type="text" id="newUsername" placeholder="User">
                    <input type="password" id="newPassword" placeholder="Pass">
                    <button onclick="tambahUser()" style="background:var(--info); color:white;">+ User</button>
                </div>
                <div style="max-height:120px; overflow:auto;"><table style="background:white;"><tbody id="userTableBody"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('mitraKaca_v7_db')) || {
        inventory: { "Clear 5mm": { harga: 350000, gm: 15000, bor: 5000, pojok: 5000, tepi: 7000, bev2: 15000, bev3: 20000 } },
        users: [ {user: "admin", pass: "admin123", role: "admin"} ],
        kop: { nama: "MITRA KACA", alamat: "Jl. Aluminium No. 123" },
        history: []
    };

    let keranjang = [];
    let currentTotal = 0;

    // SET TANGGAL HARI INI
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tgl_input').value = today;
    document.getElementById('liveDate').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    function saveDB() { localStorage.setItem('mitraKaca_v7_db', JSON.stringify(db)); renderUI(); }

    function cekLogin() {
        const u = document.getElementById('userLogin').value;
        const p = document.getElementById('passLogin').value;
        const found = db.users.find(x => x.user === u && x.pass === p);
        if(found) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('displayUser').innerText = "Halo, " + u;
            if(found.role === 'admin') document.getElementById('btnAdmin').style.display = 'block';
            renderUI();
        } else { alert("Login Salah!"); }
    }

    function renderUI() {
        document.getElementById('kopNama').innerText = db.kop.nama;
        document.getElementById('kopAlamat').innerText = db.kop.alamat;
        const sel = document.getElementById('selKaca'); sel.innerHTML = "";
        for (let k in db.inventory) { sel.innerHTML += `<option value="${k}">${k}</option>`; }
    }

    function tambahItem() {
        const p = parseFloat(document.getElementById('p').value);
        const l = parseFloat(document.getElementById('l').value);
        const d = db.inventory[document.getElementById('selKaca').value];
        if(!p || !l) return;
        const bev = document.getElementById('bevel').value;
        let h_bev = (bev === 'bev2') ? (2*(p/100) + 2*(l/100)) * d.bev2 : (bev === 'bev3' ? (2*(p/100) + 2*(l/100)) * d.bev3 : 0);
        const sub = ((p/100 * l/100) * d.harga) + ((2*(p/100) + 2*(l/100)) * d.gm) + h_bev + (parseInt(document.getElementById('bor').value)*d.bor) + (parseInt(document.getElementById('pojok').value)*d.pojok) + (parseInt(document.getElementById('tepi').value)*d.tepi);
        keranjang.push({ jenis: document.getElementById('selKaca').value, p, l, subtotal: sub, detail: `B:${document.getElementById('bor').value}, ${bev}` });
        renderBill();
    }

    function renderBill() {
        const body = document.getElementById('billBody'); body.innerHTML = ""; currentTotal = 0;
        keranjang.forEach((it, i) => {
            currentTotal += it.subtotal;
            body.innerHTML += `<tr><td>${it.jenis}</td><td>${it.p}x${it.l}</td><td>${it.detail}</td><td>Rp ${Math.round(it.subtotal).toLocaleString()}</td><td class="no-print"><button onclick="keranjang.splice(${i},1);renderBill();">X</button></td></tr>`;
        });
        document.getElementById('totalDisplay').innerText = "TOTAL: Rp " + Math.round(currentTotal).toLocaleString();
        toggleDP();
    }

    function prosesTransaksi() {
        if(keranjang.length === 0) return;
        const tglNota = document.getElementById('tgl_input').value;
        document.getElementById('notaTanggal').innerText = "Tanggal: " + tglNota;
        db.history.push({ 
            id: Date.now(), 
            tgl: tglNota, 
            pembeli: document.getElementById('pembeli').value, 
            total: Math.round(currentTotal), 
            status: document.getElementById('status_bayar').value 
        });
        saveDB(); window.print(); keranjang = []; renderBill();
    }

    function bukaAdmin() { document.getElementById('adminModal').style.display = 'block'; renderHistory(); renderAdminTable(); renderUserTable(); }
    
    function renderHistory() {
        const hBody = document.getElementById('historyBody'); hBody.innerHTML = "";
        db.history.sort((a,b) => b.id - a.id).forEach(h => {
            const statusTag = h.status === 'Lunas' ? `<span class="status-tag tag-lunas">LUNAS</span>` : `<span class="status-tag tag-hutang">HUTANG</span>`;
            const btnLunas = h.status !== 'Lunas' ? `<button onclick="lunaskan(${h.id})" style="font-size:10px; background:var(--success); color:white; width:auto; padding:2px 5px;">Set Lunas</button>` : '';
            hBody.innerHTML += `<tr><td>${h.tgl}</td><td>${h.pembeli}</td><td>Rp ${h.total.toLocaleString()}</td><td>${statusTag}</td><td>${btnLunas}</td></tr>`;
        });
    }

    function lunaskan(id) { const i = db.history.findIndex(x => x.id === id); if(i !== -1) { db.history[i].status = 'Lunas'; saveDB(); renderHistory(); } }
    
    function renderAdminTable() {
        const b = document.getElementById('adminTableBody'); b.innerHTML = "";
        for (let k in db.inventory) { b.innerHTML += `<tr><td>${k}</td><td><button onclick="isiEdit('${k}')">Edit</button> <button onclick="hapusKaca('${k}')" style="background:red; color:white;">Hapus</button></td></tr>`; }
    }

    function hapusKaca(k) { if(confirm("Hapus " + k + "?")) { delete db.inventory[k]; saveDB(); renderAdminTable(); } }

    function isiEdit(k) {
        const d = db.inventory[k];
        document.getElementById('admNama').value = k; document.getElementById('admHarga').value = d.harga;
        document.getElementById('admGM').value = d.gm; document.getElementById('admBor').value = d.bor;
        document.getElementById('admPojok').value = d.pojok; document.getElementById('admTepi').value = d.tepi;
        document.getElementById('admBev2').value = d.bev2; document.getElementById('admBev3').value = d.bev3;
    }

    function updateHarga() {
        const n = document.getElementById('admNama').value; if(!n) return;
        db.inventory[n] = { harga: parseInt(document.getElementById('admHarga').value), gm: parseInt(document.getElementById('admGM').value), bor: parseInt(document.getElementById('admBor').value), pojok: parseInt(document.getElementById('admPojok').value), tepi: parseInt(document.getElementById('admTepi').value), bev2: parseInt(document.getElementById('admBev2').value), bev3: parseInt(document.getElementById('admBev3').value) };
        saveDB(); renderAdminTable(); alert("Berhasil!");
    }

    function tambahUser() {
        const u = document.getElementById('newUsername').value, p = document.getElementById('newPassword').value;
        if(!u || !p) return alert("Isi lengkap!");
        db.users.push({user: u, pass: p, role: 'user'}); saveDB(); renderUserTable();
        document.getElementById('newUsername').value = ""; document.getElementById('newPassword').value = "";
    }

    function renderUserTable() {
        const b = document.getElementById('userTableBody'); b.innerHTML = "";
        db.users.forEach((u, i) => {
            b.innerHTML += `<tr><td>${u.user}</td><td><button onclick="gantiPass(${i})" style="font-size:10px;">Pass</button> <button onclick="if(confirm('Hapus?')){db.users.splice(${i},1);saveDB();renderUserTable();}" style="background:red; color:white; font-size:10px;">X</button></td></tr>`;
        });
    }

    function gantiPass(i) { const p = prompt("Pass Baru:"); if(p) { db.users[i].pass = p; saveDB(); alert("Ok!"); } }
    function toggleDP() {
        const isH = document.getElementById('status_bayar').value === "Belum Lunas";
        document.getElementById('dp_area').style.display = isH ? "block" : "none";
        document.getElementById('statusDisplay').innerText = isH ? `SISA: Rp ${Math.round(currentTotal - (parseFloat(document.getElementById('dp_val').value)||0)).toLocaleString()}` : "STATUS: LUNAS";
    }
    function hapusRiwayat() { if(confirm("Hapus semua?")) { db.history = []; saveDB(); renderHistory(); } }
    function tutupAdmin() { document.getElementById('adminModal').style.display = 'none'; }
    renderUI();
</script>
</body>
</html>
